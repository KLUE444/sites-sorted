<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sites Sorted | Affordable Websites for Small Businesses</title>
  <meta name="description" content="Affordable, done-for-you websites for small businesses. We build it, host it, keep it updated, and make the tech side simple." />

  <!-- FAVICONS -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- GOOGLE LOGO SCHEMA -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Sites Sorted",
    "url": "https://sitessorted.co.uk",
    "logo": "https://sitessorted.co.uk/images/sites_sorted_logo_512x512.png"
  }
  </script>

  <style>
    :root {
      --bg: #f7f2eb;
      --surface: #fffaf5;
      --text: #2f241d;
      --muted: #6c5b4f;
      --accent: #7a4b2d;
      --accent-dark: #5f3820;
      --line: #e8d9cb;
      --shadow: 0 10px 30px rgba(47, 36, 29, 0.08);
      --radius: 22px;
      --max: 1120px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      width: min(calc(100% - 32px), var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
      background: rgba(247, 242, 235, 0.9);
      border-bottom: 1px solid rgba(122, 75, 45, 0.08);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      gap: 16px;
    }

    .brand img {
      height: 42px;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 22px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      border: none;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform .2s ease, background .2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: var(--accent-dark);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .hero {
      padding: 72px 0 48px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: center;
    }

    .eyebrow {
      display: inline-block;
      background: #efe1d4;
      color: var(--accent-dark);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.86rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1, h2, h3 {
      margin: 0 0 14px;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    h1 { font-size: clamp(2.4rem, 5vw, 4.5rem); }
    h2 { font-size: clamp(1.8rem, 3vw, 2.8rem); }
    h3 { font-size: 1.2rem; }

    .lead {
      font-size: 1.1rem;
      color: var(--muted);
      max-width: 650px;
      margin-bottom: 24px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .mini-points {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .price-card {
      padding: 28px;
    }

    .price-badge {
      display: inline-block;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      background: #efe1d4;
      color: var(--accent-dark);
      margin-bottom: 14px;
    }

    .price-main {
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 4px;
    }

    .price-sub {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .tick-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .tick-list li {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .tick-list li:last-child { border-bottom: none; }

    section {
      padding: 34px 0;
    }

    .section-head {
      max-width: 760px;
      margin-bottom: 22px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .muted { color: var(--muted); }
    .small { font-size: 0.92rem; }

    .pricing-highlight {
      border: 2px solid var(--accent);
    }

    .price-line {
      font-size: 2rem;
      font-weight: 800;
      margin: 10px 0 6px;
      letter-spacing: -0.04em;
    }

    .kicker {
      color: var(--accent-dark);
      font-weight: 700;
      font-size: 0.92rem;
      margin-bottom: 8px;
    }

    .portfolio-card {
      padding: 0;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .portfolio-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(47, 36, 29, 0.14);
    }

    .portfolio-link {
      display: block;
      position: relative;
    }

    .portfolio-img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .portfolio-overlay {
      position: absolute;
      inset: 0;
      background: rgba(47, 36, 29, 0.55);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .portfolio-card:hover .portfolio-overlay {
      opacity: 1;
    }

    .portfolio-content {
      padding: 22px;
    }

    .about-box {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 22px;
      align-items: center;
    }

    .profile-photo {
      width: 180px;
      height: 180px;
      border-radius: 24px;
      object-fit: cover;
      object-position: center;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      display: block;
    }

    .cta {
      padding: 36px 0 74px;
    }

    .cta-box {
      background: linear-gradient(180deg, #fffaf5 0%, #f2e4d8 100%);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 34px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    footer {
      padding: 22px 0 50px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 860px) {
      .hero-grid, .grid-3, .grid-2, .about-box {
        grid-template-columns: 1fr;
      }

      .nav {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero {
        padding-top: 42px;
      }

      .profile-photo {
        width: 100%;
        max-width: 220px;
        height: 220px;
      }

      .portfolio-img {
        height: 240px;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="container nav">
      <a href="#top" class="brand">
        <img src="images/sites_sorted_logo_512x512.png" alt="Sites Sorted logo">
      </a>
      <nav class="nav-links">
        <a href="#why">Why a website?</a>
        <a href="#pricing">Pricing</a>
        <a href="#work">Recent work</a>
        <a href="#faq">FAQ</a>
        <a href="#contact" class="btn">Get My Website Sorted</a>
      </nav>
    </div>
  </header>
